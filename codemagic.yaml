# Codemagic CI/CD — builds the iOS app on a cloud Mac (no Mac needed on your end).
# Capacitor 8 uses Swift Package Manager, so there is NO CocoaPods step.
#
# Signing uses the explicit App Store Connect API key flow with `--create`, which
# CREATES the provisioning profile for a brand-new App ID (the automatic ios_signing
# block only FETCHES an existing one and fails on first build).
#
# Requires, set up once in Codemagic (see IOS_BUILD_GUIDE.md):
#   1. App Store Connect API key integration named  Codemagic
#   2. Env var group "appstore_credentials" containing a secure CERTIFICATE_PRIVATE_KEY
#      (an RSA 2048 private key — generated once, used to create the signing certificate)

workflows:
  ios-app-store:
    name: iOS — Dodge Mike's Newport Send
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic        # name of your App Store Connect API key integration in Codemagic
    environment:
      groups:
        - appstore_credentials                     # must contain a secure CERTIFICATE_PRIVATE_KEY variable
      vars:
        BUNDLE_ID: "com.sailwestcapital.dodgenewportsend"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6777284091"
      node: 20
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets and sync iOS
        script: |
          npm run build
          npx cap sync ios
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch or create signing files (creates the profile + certificate)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add the signing certificate to the keychain
        script: keychain add-certificates
      - name: Apply provisioning profile to the Xcode project
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID") + 1)) || agvtool new-version -all 1
      - name: Build signed .ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true        # uploads to TestFlight; promote to the App Store from App Store Connect
