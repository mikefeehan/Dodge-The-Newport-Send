# Codemagic CI/CD — builds the iOS app on a cloud Mac (no Mac needed on your end).
# Capacitor 8 uses Swift Package Manager, so there is NO CocoaPods step.
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/
#
# Configured: bundle com.sailwestcapital.dodgenewportsend, App Store Connect key "CodemagicAppStore",
# Apple ID 6777284091. See IOS_BUILD_GUIDE.md for the full setup notes.

workflows:
  ios-app-store:
    name: iOS — Dodge Mike's Newport Send
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CodemagicAppStore        # name of your App Store Connect API key integration in Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sailwestcapital.dodgenewportsend   # must match your App Store Connect app's Bundle ID
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6777284091"           # your app's numeric Apple ID from App Store Connect
      node: 20
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets and sync iOS
        script: |
          npm run build
          npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID") + 1)) || agvtool new-version -all 1
      - name: Build signed .ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true        # uploads to TestFlight; promote to the App Store from App Store Connect
